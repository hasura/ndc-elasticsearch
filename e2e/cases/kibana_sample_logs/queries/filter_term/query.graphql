# TODO(first-run): the DDN model name is generated by `ddn model add "*"` from the
# connector collection (the kibana logs data stream, keyed ".ds-kibana_sample_data_logs-*").
# Run the suite once, inspect the built metadata / engine schema, and replace `logs`
# below with the generated model field name. Then regenerate goldens (UPDATE_GOLDEN=1).
query FilterTerm {
  logs(where: { geo: { dest: { _eq: "US" } } }, order_by: { bytes: Desc }, limit: 10) {
    bytes
    geo { dest }
  }
}
